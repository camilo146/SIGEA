# ==============================================================================
# PERFIL PRODUCCION
# ==============================================================================
# Activar con: --spring.profiles.active=prod
# Todas las propiedades sensibles se leen de variables de entorno del sistema.
# Nunca escribir credenciales aqui directamente.

# En produccion debe mantenerse activa la verificacion por codigo.
sigea.auth.require-email-verification=${SIGEA_AUTH_REQUIRE_EMAIL_VERIFICATION:true}

# Puerto de produccion (ajustar segun servidor)
server.port=${PORT:8080}

# Base de datos de produccion
spring.datasource.url=${SIGEA_DB_URL}
spring.datasource.username=${SIGEA_DB_USERNAME}
spring.datasource.password=${SIGEA_DB_PASSWORD}

# SMTP real (Gmail con contrasena de aplicacion, Outlook, SendGrid, etc.)
spring.mail.host=${SIGEA_SMTP_HOST}
spring.mail.port=${SIGEA_SMTP_PORT:587}
spring.mail.username=${SIGEA_SMTP_USERNAME}
spring.mail.password=${SIGEA_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# WhatsApp (Twilio)
sigea.whatsapp.enabled=${SIGEA_WHATSAPP_ENABLED:false}
sigea.whatsapp.default-country-code=${SIGEA_WHATSAPP_DEFAULT_COUNTRY_CODE:+57}
sigea.whatsapp.twilio.account-sid=${SIGEA_TWILIO_ACCOUNT_SID:}
sigea.whatsapp.twilio.auth-token=${SIGEA_TWILIO_AUTH_TOKEN:}
sigea.whatsapp.twilio.from=${SIGEA_TWILIO_FROM:whatsapp:+14155238886}

# URL del frontend en produccion (para los enlaces de correo)
sigea.app.url=${SIGEA_APP_URL}

# JWT: cambiar el secreto por uno largo y aleatorio en produccion
sigea.jwt.secret=${SIGEA_JWT_SECRET}
