# ==============================================================================
# SIGEA - Sistema Integral de Gestion de Equipos y Activos
# Configuracion principal de la aplicacion
# ==============================================================================
# Este archivo contiene TODOS los parametros que Spring Boot necesita para
# funcionar. Es el "cerebro" de la configuracion. Aqui le decimos a Spring:
# - Donde esta la base de datos
# - Como conectarse
# - Como manejar la seguridad
# - Como enviar correos
# - Y muchas cosas mas
# ==============================================================================

# --- Nombre de la aplicacion ---
# Spring usa este nombre internamente para identificar la app
spring.application.name=sigea-backend

# ============================================================================== 
# CARGA OPCIONAL DE .env
# ============================================================================== 
# Spring Boot no carga archivos .env por defecto. Estas rutas permiten usar un
# .env estilo KEY=VALUE tanto si el backend se inicia desde la raiz del workspace
# como si se inicia desde la carpeta sigea-backend.
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:sigea-backend/.env[.properties]

# ==============================================================================
# BASE DE DATOS - MariaDB
# ==============================================================================
# Aqui le decimos a Spring DONDE esta la base de datos y COMO conectarse.
# jdbc:mariadb:// = protocolo de conexion (como http:// pero para bases de datos)
# localhost:3306  = la BD esta en esta misma maquina, puerto 3306 (default MariaDB)
# sigea_db       = nombre de la base de datos que crearemos
spring.datasource.url=jdbc:mariadb://localhost:3305/sigea_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Bogota

# Credenciales de conexion a la BD — en produccion inyectar via SIGEA_DB_USER / SIGEA_DB_PASSWORD
spring.datasource.username=${SIGEA_DB_USER:sigea_user}
spring.datasource.password=${SIGEA_DB_PASSWORD:sigea_password_2026}

# Driver JDBC: le dice a Java QUE tipo de BD es (MariaDB)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ==============================================================================
# HIKARICP - Pool de conexiones (soporta 30+ sesiones concurrentes)
# ==============================================================================
# Ajustar estas variables para ambientes con alta concurrencia (ej. 30 ALIMENTADOR_EQUIPOS).
# Los valores se inyectan desde el .env para poder cambiar sin recompilar.
spring.datasource.hikari.pool-name=SigeaHikariPool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:40}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}

# ==============================================================================
# JPA / HIBERNATE - Mapeo Objeto-Relacional
# ==============================================================================
# Hibernate es el motor que traduce clases Java <-> tablas SQL automaticamente.

# ddl-auto=validate: Hibernate SOLO verifica que las entidades coincidan con las tablas.
# NO crea ni modifica tablas. Eso lo hace Flyway (migraciones controladas).
# Opciones: none | validate | update | create | create-drop
# En desarrollo podrias usar "update", pero en produccion SIEMPRE "validate".
spring.jpa.hibernate.ddl-auto=validate

# Mostrar las consultas SQL que Hibernate genera (solo en desarrollo, false en produccion)
spring.jpa.show-sql=false

# Formato bonito para las consultas SQL (mas facil de leer)
spring.jpa.properties.hibernate.format_sql=true

# Dialecto: le dice a Hibernate que estamos usando MariaDB
# para que genere SQL optimizado para este motor
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ==============================================================================
# FLYWAY - Migraciones de Base de Datos
# ==============================================================================
# Flyway es como "Git pero para la base de datos". Cada cambio en la estructura
# de la BD se escribe como un archivo SQL versionado (V1__crear_tablas.sql,
# V2__agregar_columna.sql, etc.) y Flyway los ejecuta en orden.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==============================================================================
# SERVIDOR
# ==============================================================================
# Puerto donde corre la aplicacion (default 8080)
# Se accede en: http://localhost:8080
# Si 8080 está en uso: perfil altport (8081) o altport2 (8082). Actualiza proxy en sigea-frontend.
# PowerShell: mvn spring-boot:run "-Dspring-boot.run.arguments=--spring.profiles.active=altport"
# O cualquier puerto: mvn spring-boot:run "-Dspring-boot.run.arguments=--server.port=8082"
server.port=8080

# Prefijo para TODOS los endpoints de la API
# Asi: http://localhost:8080/api/v1/usuarios
server.servlet.context-path=/api/v1

# ==============================================================================
# SEGURIDAD - JWT
# ==============================================================================
# Clave secreta para firmar los tokens JWT (CAMBIAR en produccion)
# Un JWT es como un "pase temporal" que el usuario recibe al hacer login.
# Con cada peticion HTTP, el usuario envia ese pase y el servidor lo verifica.
# Clave JWT — en produccion inyectar via SIGEA_JWT_SECRET (minimo 32 caracteres)
sigea.jwt.secret=${SIGEA_JWT_SECRET:sigea-clave-secreta-desarrollo-cambiar-en-produccion-2026-sena-cimi}
sigea.jwt.expiration-ms=28800000
# 28800000 ms = 8 horas (sesión válida; al expirar el front muestra "Tu sesión ha expirado")

# Autenticacion: para pruebas locales dejar en false para registrar/iniciar sesion sin codigo.
sigea.auth.require-email-verification=${SIGEA_AUTH_REQUIRE_EMAIL_VERIFICATION:false}

# ==============================================================================
# CORREO ELECTRONICO (SMTP)
# ==============================================================================
# Configuracion para enviar correos de notificacion (RF-NOT-01 a RF-NOT-06)
# NOTA: Con host=localhost los correos NO se entregan a bandeja real (no hay servidor SMTP).
# Cuando el envío falla, el contenido (código de verificación, notificaciones) se escribe en el log
# del backend para que pueda verse en consola. Para que lleguen a correo real:
# 1) Para Gmail se debe activar verificación en dos pasos y crear una contraseña de aplicación de 16 caracteres.
# 2) Configure host, port, username y password correctos en variables de entorno o en un perfil seguro.
spring.mail.host=${SIGEA_SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SIGEA_SMTP_PORT:465}
spring.mail.username=${SIGEA_SMTP_USERNAME:sigeasena@gmail.com}
spring.mail.password=${SIGEA_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SIGEA_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SIGEA_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${SIGEA_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${SIGEA_SMTP_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.ssl.trust=${SIGEA_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.ssl.protocols=${SIGEA_SMTP_SSL_PROTOCOLS:TLSv1.2}
spring.mail.properties.mail.smtp.connectiontimeout=${SIGEA_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SIGEA_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SIGEA_SMTP_WRITE_TIMEOUT:5000}
sigea.mail.from-name=${SIGEA_MAIL_FROM_NAME:SIGEA SENA}

# ==============================================================================
# WHATSAPP (TWILIO)
# ==============================================================================
# Si está habilitado y el usuario registra telefono, el codigo se enviara por WhatsApp.
# Si no está habilitado, se usa correo como canal de respaldo.
sigea.whatsapp.enabled=${SIGEA_WHATSAPP_ENABLED:false}
sigea.whatsapp.default-country-code=${SIGEA_WHATSAPP_DEFAULT_COUNTRY_CODE:+57}
sigea.whatsapp.twilio.account-sid=${SIGEA_TWILIO_ACCOUNT_SID:}
sigea.whatsapp.twilio.auth-token=${SIGEA_TWILIO_AUTH_TOKEN:}
sigea.whatsapp.twilio.from=${SIGEA_TWILIO_FROM:whatsapp:+14155238886}
# URL base del frontend para enlaces de verificación de email (cambiar en producción)
# En producción se inyecta la variable de entorno SIGEA_APP_URL (ej: http://192.168.4.250:4043)
# Esta misma URL se agrega automáticamente a los orígenes CORS permitidos.
sigea.app.url=${SIGEA_APP_URL:http://localhost:8082}

# ==============================================================================
# ALMACENAMIENTO DE ARCHIVOS
# ==============================================================================
# Directorio donde se guardan las fotos de equipos (RF-INV-07)
# En produccion seria algo como /var/sigea/uploads/
sigea.uploads.path=${SIGEA_UPLOADS_PATH:./uploads}
sigea.uploads.max-file-size=5MB
sigea.uploads.allowed-extensions=jpg,jpeg,png

# Limite de tamano para subir archivos (Spring Boot)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# ==============================================================================
# DOCUMENTACION API (Swagger / OpenAPI)
# ==============================================================================
# SpringDoc genera automaticamente la documentacion de tu API REST.
# Se accede en: http://localhost:8080/api/v1/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==============================================================================
# ACTUATOR (Monitoreo)
# ==============================================================================
# Endpoints de salud y metricas del sistema
# Se accede en: http://localhost:8080/api/v1/actuator/health
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
# En desarrollo no hay servidor SMTP real, deshabilitamos ese health check
# para que no arrastre el estado global a DOWN
management.health.mail.enabled=false

# ==============================================================================
# LOGGING (Registro de eventos)
# ==============================================================================
# Niveles: TRACE < DEBUG < INFO < WARN < ERROR
# En produccion usar INFO o WARN para no exponer datos sensibles en logs.
logging.level.co.edu.sena.sigea=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
