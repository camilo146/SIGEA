# Otro puerto alternativo (8082) si 8080 y 8081 están ocupados.
# PowerShell: mvn spring-boot:run "-Dspring-boot.run.arguments=--spring.profiles.active=altport2"
# Frontend proxy: "target": "http://localhost:8082"
server.port=8082

# ==============================================================================
# SMTP LOCAL (MailHog) - Solo para desarrollo local
# ==============================================================================
# MailHog es un servidor SMTP falso que captura todos los correos enviados
# y los muestra en http://localhost:8025 sin reenviarlos a ningun destinatario real.
#
# Instalacion (una sola vez):
#   winget install --id MailHog.MailHog
#
# Antes de iniciar el backend, ejecutar en una terminal aparte:
#   mailhog
#
# Luego abrir http://localhost:8025 para ver los correos capturados.
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
