# Perfil de test: H2 en memoria, sin Flyway, schema desde entidades JPA
spring.application.name=sigea-backend-test

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA: crear y borrar schema al iniciar/finalizar (solo para tests)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Desactivar Flyway en test (el schema lo genera Hibernate desde entidades)
spring.flyway.enabled=false

# JWT mínimo para que arranque el contexto
sigea.jwt.secret=test-secret-key-minimo-32-caracteres-requeridos
sigea.jwt.expiration-ms=3600000

# Mail y tareas programadas desactivados en test
spring.mail.host=localhost
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
spring.task.scheduling.enabled=false

# Uploads en test
sigea.uploads.path=./uploads-test
