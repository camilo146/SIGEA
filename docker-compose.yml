services:
  db:
    image: mariadb:11.4
    container_name: sigea-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-sigea_db}
      MARIADB_USER: ${MARIADB_USER:-sigea_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-sigea_password_2026}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_sigea_2026}
    ports:
      - "3305:3306"
    volumes:
      - sigea-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p${MARIADB_ROOT_PASSWORD:-root_sigea_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./sigea-backend
    container_name: sigea-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mariadb://db:3306/sigea_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Bogota}
      SPRING_DATASOURCE_USERNAME: ${MARIADB_USER:-sigea_user}
      SPRING_DATASOURCE_PASSWORD: ${MARIADB_PASSWORD:-sigea_password_2026}
      SERVER_PORT: 8080
      SIGEA_UPLOADS_PATH: ${SIGEA_UPLOADS_PATH:-/app/uploads}
      SIGEA_APP_URL: ${SIGEA_APP_URL:-http://localhost}
      SIGEA_AUTH_REQUIRE_EMAIL_VERIFICATION: ${SIGEA_AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      SIGEA_SMTP_HOST: ${SIGEA_SMTP_HOST:-smtp.gmail.com}
      SIGEA_SMTP_PORT: ${SIGEA_SMTP_PORT:-587}
      SIGEA_SMTP_USERNAME: ${SIGEA_SMTP_USERNAME:-}
      SIGEA_SMTP_PASSWORD: ${SIGEA_SMTP_PASSWORD:-}
      SIGEA_SMTP_AUTH: ${SIGEA_SMTP_AUTH:-true}
      SIGEA_SMTP_STARTTLS: ${SIGEA_SMTP_STARTTLS:-true}
      SIGEA_SMTP_STARTTLS_REQUIRED: ${SIGEA_SMTP_STARTTLS_REQUIRED:-true}
      SIGEA_SMTP_SSL_TRUST: ${SIGEA_SMTP_SSL_TRUST:-smtp.gmail.com}
      SIGEA_SMTP_CONNECTION_TIMEOUT: ${SIGEA_SMTP_CONNECTION_TIMEOUT:-20000}
      SIGEA_SMTP_TIMEOUT: ${SIGEA_SMTP_TIMEOUT:-20000}
      SIGEA_SMTP_WRITE_TIMEOUT: ${SIGEA_SMTP_WRITE_TIMEOUT:-20000}
      SIGEA_SMTP_SSL_PROTOCOLS: ${SIGEA_SMTP_SSL_PROTOCOLS:-TLSv1.2}
      SIGEA_MAIL_FROM_NAME: ${SIGEA_MAIL_FROM_NAME:-SIGEA SENA}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false}
    ports:
      - "127.0.0.1:8080:8080"
      - "8082:8080"
    volumes:
      - sigea-uploads:/app/uploads

  frontend:
    build:
      context: ./sigea-frontend
    container_name: sigea-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./sigea-frontend/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  sigea-db-data:
  sigea-uploads:
