<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3dbf00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d8500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Graduation cap base polygon -->
  <polygon points="50,18 12,37 50,56 88,37" fill="rgba(255,255,255,0.95)"/>
  <!-- Cap body (open trapezoid) -->
  <path d="M28 46 L28 63 Q50 74 72 63 L72 46 L50 57 Z" fill="rgba(255,255,255,0.85)"/>
  <!-- Tassel stick -->
  <line x1="88" y1="37" x2="88" y2="57" stroke="rgba(255,255,255,0.85)" stroke-width="5" stroke-linecap="round"/>
  <!-- Tassel ball -->
  <circle cx="88" cy="61" r="4.5" fill="rgba(255,255,255,0.9)"/>
  <!-- SENA text -->
  <text x="50" y="90" font-family="Arial Black, Arial, sans-serif" font-size="13" font-weight="900" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="3">SENA</text>
</svg>
