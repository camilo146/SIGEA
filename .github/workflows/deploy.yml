name: Continuous Deployment SIGEA

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sigea-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Actualizar checkout del servidor
        shell: bash
        run: |
          set -euo pipefail
          cd /opt/sigea/SIGEA
          git stash 2>/dev/null || true
          git pull origin main

      - name: Ejecutar script de despliegue
        shell: bash
        run: |
          set -euo pipefail
          cd /opt/sigea/SIGEA
          SIGEA_SKIP_PULL=1 bash ./deploy.sh update

      - name: Mostrar estado del stack si algo falla
        if: failure()
        shell: bash
        run: |
          set +e
          cd /opt/sigea/SIGEA
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --tail=200 frontend backend db