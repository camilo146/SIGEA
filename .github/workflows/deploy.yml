name: Continuous Deployment SIGEA

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sigea-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Ejecutar script de despliegue
        shell: bash
        run: |
          set -euo pipefail
          cd /opt/sigea/SIGEA
          bash ./deploy.sh update